name: Daily Entertainment News

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_NEWS_US }}
        run: python scripts/generate_dashboard.py --genre entertainment

      - name: Commit and push updated dashboard
        run: |
          git config user.name "ai-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update entertainment news dashboard $(date -u +'%Y-%m-%d')"
          git push
