name: Daily AI News Dashboard

on:
  schedule:
    # 21:00 UTC = 06:00 JST (next day). GitHub's scheduler can run this up to
    # ~30-60 minutes late during high load; that's expected and harmless here.
    - cron: '0 21 * * *'
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated dashboard

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_NEWS_US }}
        run: python scripts/generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "ai-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update AI news dashboard $(date -u +'%Y-%m-%d')"
          git push
